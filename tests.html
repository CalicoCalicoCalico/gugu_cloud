<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>담배 줍기 — 단위 테스트 (0차)</title>
        <style>
            body { font-family: monospace; padding: 16px; }
            .pass { color: #1a7f37; }
            .fail { color: #cf222e; font-weight: bold; }
        </style>
    </head>
    <body>
        <h2>TDD 8단계 단위 테스트 (0차 해당분)</h2>
        <div id="out"></div>

        <!-- 로직 파일만 로드 (main.js·loop·render 제외 → DOM/루프 불필요) -->
        <script src="js/helpers.js"></script>
        <script src="js/data.js"></script>
        <script src="js/state.js"></script>
        <script src="js/systems/input.js"></script>
        <script src="js/systems/movement.js"></script>
        <script src="js/systems/interaction.js"></script>

        <script>
            const out = document.getElementById("out");
            let passed = 0,
                failed = 0;

            function check(name, cond) {
                const div = document.createElement("div");
                div.className = cond ? "pass" : "fail";
                div.textContent = `${cond ? "PASS" : "FAIL"} — ${name}`;
                out.appendChild(div);
                cond ? passed++ : failed++;
            }

            // ── 테스트 1: smoke() 겹침+interact (7단계+원자성) ──
            resetGameState();
            STATE.input.interact = true;
            STATE.cigarettes = [
                {
                    id: "t1",
                    x: STATE.player.x,
                    y: STATE.player.y,
                    w: DATA.CIGARETTE.w,
                    h: DATA.CIGARETTE.h,
                    collected: false,
                },
            ];
            smoke();
            check(
                "smoke() 겹침+interact → 게이지 += score & collected==true",
                STATE.lungGauge === DATA.CIGARETTE.score &&
                    STATE.cigarettes[0].collected === true,
            );

            // ── 테스트 2: smoke() 이미 collected → 무동작 (8 이중 줍기) ──
            const before = STATE.lungGauge;
            smoke(); // 같은 담배, 이미 collected
            check(
                "smoke() 이미 collected → 게이지 그대로 (이중 가산 없음)",
                STATE.lungGauge === before,
            );

            // ── 테스트 3: addGauge 큰 값 → [0,100] clamp (4 도메인) ──
            resetGameState();
            addGauge(99999);
            check(
                "addGauge(큰 값) → lungGauge 가 GAUGE_MAX 로 clamp",
                STATE.lungGauge === DATA.GAUGE_MAX,
            );

            // ── 테스트 4: movePlayer 경계 밖 → x clamp (위치) ──
            resetGameState();
            STATE.input.left = true;
            for (let i = 0; i < 1000; i++) movePlayer(); // 왼쪽으로 계속
            check("movePlayer 왼쪽 끝 → x == 0", STATE.player.x === 0);

            resetGameState();
            STATE.input.right = true;
            for (let i = 0; i < 1000; i++) movePlayer(); // 오른쪽으로 계속
            check(
                "movePlayer 오른쪽 끝 → x == fieldW - playerW",
                STATE.player.x === DATA.FIELD.width - DATA.PLAYER.w,
            );

            // ── 테스트 5: isColliding 겹침/떨어짐 (8 히트박스) ──
            const A = { x: 0, y: 0, w: 10, h: 10 };
            check(
                "isColliding 겹침 → true",
                isColliding(A, { x: 5, y: 5, w: 10, h: 10 }) === true,
            );
            check(
                "isColliding 떨어짐 → false",
                isColliding(A, { x: 100, y: 100, w: 10, h: 10 }) === false,
            );

            const summary = document.createElement("h3");
            summary.textContent = `결과: ${passed} 통과 / ${failed} 실패`;
            out.appendChild(summary);
        </script>
    </body>
</html>
