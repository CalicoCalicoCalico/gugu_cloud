<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>구구름과자</title>

        <link rel="icon" type="image/x-icon" href="/img/cig.png" />

        <!-- CSS: tokens → 리셋 → 레이아웃 → 부품 순서 -->
        <link rel="stylesheet" href="css/tokens.css" />
        <link rel="stylesheet" href="css/base.css" />
        <link rel="stylesheet" href="css/layout.css" />
        <link rel="stylesheet" href="css/components.css" />
    </head>
    <body>
        <!-- 모든 씬을 담는 박스. 씬 흐름: title → introVideo → play → endingVideo → end -->
        <div id="game-container">
            <!-- ═══ 씬: 타이틀 ═══ -->
            <div id="scene-title" class="scene active">
                <h1>구구름과자</h1>
                <p>← → (또는 A·D)로 이동, E로 줍기</p>
                <button id="btn-game-start" class="btn-primary">
                    시작하기
                </button>
            </div>

            <!-- ═══ 씬: 인트로 영상(이미지) ═══ -->
            <!-- 이미지 한 장을 보여주고 잠시 후 자동으로 play 로 넘어간다.
                 ⚠ TODO(에셋): src 를 실제 인트로 이미지 경로로 교체. -->
            <div id="scene-introVideo" class="scene">
                <img class="scene-image" src="img/intro.png" alt="인트로" />
            </div>

            <!-- ═══ 씬: 플레이 ═══ -->
            <div id="scene-play" class="scene">
                <!-- HUD: 폐 게이지 -->
                <div id="hud">
                    <span class="gauge-label">폐</span>
                    <div class="gauge-track">
                        <div id="gauge-fill" class="gauge-fill"></div>
                    </div>
                    <span id="gauge-value">0 / 100</span>

                    <!-- dev 버튼 (담배 수동 생성 — 테스트용) -->
                    <!-- <button id="btn-dev-spawn" class="btn-dev">
                        담배 1개 생성
                    </button> -->
                </div>

                <!-- 플레이 무대: 플레이어 + 담배가 여기 absolute 배치됨 -->
                <div id="play-field">
                    <!-- 담배 레이어 (render 가 자식 노드 생성/관리) -->
                    <div id="cigarette-layer"></div>
                    <!-- 플레이어 (render 가 left/top 설정) -->
                    <div id="player"></div>
                </div>
            </div>

            <!-- ═══ 씬: 엔딩 영상(이미지) ═══ -->
            <!-- ⚠ TODO(에셋): src 를 실제 엔딩 이미지 경로로 교체. -->
            <div id="scene-endingVideo" class="scene">
                <img class="scene-image" src="img/ending.png" alt="엔딩" />
            </div>

            <!-- ═══ 씬: 엔딩 화면 end ═══ -->
            <div id="scene-end" class="scene">
                <h2>폐가 담배연기로 가득찬 구구는 멀리멀리 날아갔대요.</h2>
                <button id="btn-restart" class="btn-primary">다시 줍기</button>
            </div>
        </div>

        <!-- ═══ 스크립트 로드 (의존성 순서) ═══ -->
        <script src="js/helpers.js"></script>
        <script src="js/data.js"></script>

        <!-- 엔티티 클래스 (state.js·systems 보다 먼저 로드, state.js가 쓰니까) -->
        <script src="js/entities/player.js"></script>
        <script src="js/entities/cigarette.js"></script>

        <script src="js/state.js"></script>
        <script src="js/systems/input.js"></script>
        <script src="js/systems/movement.js"></script>
        <script src="js/systems/interaction.js"></script>
        <script src="js/systems/spawn.js"></script>
        <!-- anim.js: 현재 보류(주석 처리됨). 다음 스코프에서 부활 예정이라 로드만 유지. -->
        <script src="js/systems/anim.js"></script>
        <script src="js/systems/judge.js"></script>
        <script src="js/systems/render.js"></script>
        <script src="js/loop.js"></script>
        <script src="js/main.js"></script>
    </body>
</html>
