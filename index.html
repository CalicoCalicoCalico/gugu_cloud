<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>구구름과자</title>

        <link rel="icon" type="image/x-icon" href="img_assets/cig.png" />

        <!-- CSS: tokens → 리셋 → 레이아웃 → 부품 순서 -->
        <link rel="stylesheet" href="css/tokens.css" />
        <link rel="stylesheet" href="css/base.css" />
        <link rel="stylesheet" href="css/layout.css" />
        <link rel="stylesheet" href="css/components.css" />
    </head>
    <body>
        <!-- 모든 씬을 담는 박스. 씬 흐름: title → introVideo → play → endingVideo → end -->

        <div id="game-container">
            <!-- ═══ 씬: 타이틀 ═══ -->
            <div id="scene-title" class="scene active">
                <img
                    class="scene-title-image"
                    src="img_assets/bg/title.png"
                    alt="타이틀"
                />
                <div class="title-controls">
                    <div class="btn-group">
                        <button id="btn-game-setting" class="btn-ui-frame">
                            <img
                                src="img_assets/ui/gameSettingButton.png"
                                alt="설정"
                            />
                        </button>
                        <button id="btn-game-start" class="btn-ui-frame">
                            <img
                                src="img_assets/ui/gameStartButton.png"
                                alt="게임 시작"
                            />
                        </button>
                        <button id="btn-game-credit" class="btn-ui-frame">
                            <img
                                src="img_assets/ui/gameNormalButton.png"
                                alt="난이도"
                            />
                        </button>
                    </div>
                </div>
            </div>

            <!-- ═══ 씬: 인트로 영상(이미지) ═══ -->
            <div id="scene-introVideo" class="scene">
                <!-- poster: 영상이 재생되기 전/실패했을 때 대신 보여줄 이미지 (= 최소 1장 보장) -->
                <video
                    id="intro-video"
                    class="scene-video"
                    src="video_assets/intro.mp4"
                    poster="img_assets/bg/opening.png"
                    playsinline
                    preload="auto"
                ></video>
                <!-- 인트로 건너뛰기 버튼 (영상 위에 떠 있음) -->
                <button id="btn-skip-intro" class="btn-skip">건너뛰기 ▸</button>
            </div>

            <!-- ═══ 씬: 플레이 ═══ -->
            <div id="scene-play" class="scene">
                <!-- HUD: 폐 게이지 -->
                <div id="hud">
                    <div class="hud-lung-box">
                        <div id="lung-gauge">
                            <!-- 레이어1: 폐 외곽선 (항상 보임) -->
                            <div id="lung-outline"></div>
                            <!-- 레이어2: 채움 색, mask로 폐 모양만 남기고 clip-path로 아래서 위로 채움 -->
                            <div id="lung-fill"></div>
                        </div>
                        <span id="gauge-value">0 / 100</span>
                    </div>
                </div>

                <!-- 플레이 무대(뷰포트): 고정 크기 창. 이 안에서 #world 가 스크롤된다. -->
                <div id="play-field">
                    <!-- 월드(맵 전체 크기). render 가 transform 으로 좌우로 민다. -->
                    <div id="world">
                        <!-- 배경 맵 이미지 (월드 맨 뒤 레이어) -->
                        <div id="map-bg"></div>
                        <!-- 담배 레이어 (render 가 자식 노드 생성/관리) -->
                        <div id="cigarette-layer"></div>
                        <div id="cig-hitbox-layer"></div>
                        <!-- 디버그용: 담배 충돌 박스 -->

                        <!-- 플레이어 (render 가 left/top 설정) -->
                        <div id="player"></div>
                        <div id="player-hitbox"></div>
                        <!-- 디버그용: 실제 충돌 박스 시각화 -->

                        <!-- 인간 발(적) 레이어 (render 가 자식 노드 생성/관리) -->
                        <div id="human-layer"></div>
                        <div id="foot-hitbox-layer"></div>
                        <!-- 디버그용: 발 충돌 박스 -->
                    </div>
                </div>
            </div>

            <!-- ═══ 씬: 엔딩 영상(이미지) ═══ -->
            <div id="scene-endingVideo" class="scene">
                <video
                    id="ending-video"
                    class="scene-video"
                    src="video_assets/ending.mp4"
                    poster="img_assets/bg/ending.png"
                    playsinline
                    preload="auto"
                ></video>
            </div>

            <!-- ═══ 설정 팝업 (esc 로 열고 닫음, play 중에만) ═══ -->
            <!-- '씬'이 아니라 게임 화면 위에 뜨는 오버레이다. 평소엔 .hidden 으로 숨김. -->
            <div id="settings-overlay" class="overlay hidden">
                <div id="settings-popup">
                    <div id="settings-close">닫기(esc)</div>
                    <h2 class="settings-title">설정</h2>
                    <div class="settings-buttons-container">
                        <!-- 다시 시작: 타이틀 화면으로 돌아간다 (다시 시작하면 게임 초기화됨) -->
                        <button
                            id="btn-settings-restart"
                            class="btn-image-style"
                        >
                            다시 줍기
                        </button>

                        <button id="btn-settings-title" class="btn-image-style">
                            타이틀로 나가기
                        </button>
                    </div>

                    <!-- TODO(다음): BGM 볼륨 슬라이더가 여기 들어옴 -->
                    <!-- BGM 볼륨 슬라이더 -->
                    <div class="settings-row">
                        <label for="bgm-volume" class="settings-label"
                            >BGM</label
                        >
                        <!-- value 는 폴백. JS가 DATA.CONFIG.AUDIO.BGM_VOLUME 로 덮어씀 -->
                        <input
                            id="bgm-volume"
                            class="bgm-slider"
                            type="range"
                            min="0"
                            max="1"
                            step="0.01"
                            value="0.5"
                        />
                    </div>
                </div>
            </div>
        </div>

        <!-- ═══ 스크립트 로드 (의존성 순서) ═══ -->
        <script src="js/helpers.js"></script>
        <script src="js/data.js"></script>

        <!-- 엔티티 클래스 (state.js·systems 보다 먼저 로드, state.js가 쓰니까) -->
        <script src="js/entities/player.js"></script>
        <script src="js/entities/cigarette.js"></script>

        <script src="js/entities/humanFoot.js"></script>
        <script src="js/entities/human.js"></script>

        <script src="js/state.js"></script>
        <script src="js/systems/input.js"></script>
        <script src="js/systems/movement.js"></script>
        <script src="js/systems/camera.js"></script>
        <script src="js/systems/interaction.js"></script>
        <script src="js/systems/spawn.js"></script>
        <!-- 담배 낙하 + 공중 데미지 시스템 (air→ground FSM) -->
        <script src="js/systems/cigaretteFall.js"></script>
        <script src="js/systems/humanWalk.js"></script>

        <!-- anim.js: 현재 보류(주석 처리됨). 다음 스코프에서 부활 예정이라 로드만 유지. -->
        <script src="js/systems/anim.js"></script>
        <script src="js/systems/judge.js"></script>
        <script src="js/systems/render.js"></script>
        <!-- BGM -->
        <script src="js/audio.js"></script>
        <script src="js/loop.js"></script>
        <!-- 설정 팝업 (esc 토글 + 다시 시작) -->
        <script src="js/settings.js"></script>

        <script src="js/main.js"></script>
    </body>
</html>
